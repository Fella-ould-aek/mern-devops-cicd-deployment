workflow:
    name: "MERN CI CD pipeline"
    rules: 
        - if: $CI_COMMIT_BRANCH== 'main' || $CI_COMMIT_BRANCH=~ /^feature/
          when: always
stages:
    - test
    - build


testing:
  stage: test
  image: node:17-alpine3.14
  services:
     - name: mongo
       alias: mongodb

  artifacts:
    when: always          # ← save report even if tests fail
    reports:
      junit: TODO/todo_backend/reports/junit.xml  # ← GitLab reads this
    expire_in: 1 week    

  cache:
     policy: pull-push
     when: on_success
     key:
        files:
          - /TODO/todo-backend/package.son
     paths:
        - /TODO/todo-backend/node_modules
  before_script:
   - cd TODO/todo_backend
   - npm install
   - npm install jest-junit
  script:
     - npm test
     - echo "=== XML content ==="
     - cat reports/junit.xml
    
build:
    stage: build
    image: docker:24
    services:
      - name: docker:24-dind        # Docker-in-Docker, lets you run docker commands inside CI
        alias: docker
    before_script:
      - docker login -u $DOCKERHUB_USERNAME -p --password-stdin 
    script:
      - docker build -f TODO/todo_backend/dockerfile.backend 
        -t $DOCKERHUB_USERNAME/todo-backend:latest .
      - docker push $DOCKERHUB_USERNAME/todo-backend:latest         

      - docker build docker/dockerfile.frontend
        -t $DOCKERHUB_USERNAME/todo-frontend:latest .  
      - docker push $DOCKERHUB_USERNAME/todo-frontend:latest  

    needs:
    - job: testing
      artifacts: false
    
    rules:
      - if: $CI_COMMIT_BRANCH == 'main' 